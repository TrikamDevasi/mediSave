# render.yaml — Deploy backend + ML service on Render.com
# Docs: https://render.com/docs/render-yaml-spec

services:
  # ──────────────────────────────────────────────────────────
  # 1. Node/Express Backend API
  # ──────────────────────────────────────────────────────────
  - type: web
    name: medisave-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free                         # upgrade to starter for always-on
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Set these in Render Dashboard → Environment:
      - key: MONGODB_URI
        sync: false                    # fill in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: FOURSQUARE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false                    # e.g. https://medi-save.vercel.app
      - key: ML_SERVICE_URL
        sync: false                    # e.g. https://medisave-ml.onrender.com

  # ──────────────────────────────────────────────────────────
  # 2. ML / RAG Microservice
  # ──────────────────────────────────────────────────────────
  - type: web
    name: medisave-ml
    runtime: node
    rootDir: ml-service
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /ml/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LLM_PROVIDER
        value: groq
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: EMBEDDING_MODEL_GEMINI
        value: models/embedding-001
      - key: EMBEDDING_MODEL_OPENAI
        value: text-embedding-3-small
      # Set these in Render Dashboard:
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false                    # e.g. https://medisave-backend.onrender.com
      - key: FRONTEND_URL
        sync: false
